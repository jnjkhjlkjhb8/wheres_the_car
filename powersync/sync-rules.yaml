bucket_definitions:
  global:
    data:
      - SELECT
            sub_route_uid AS id,
            sub_route_name,
            route_name,
            route_uid,
            city,
            depart,
            destin
          FROM bus_static
      - SELECT
            stop_uid AS id,
            stop_uid,
            stop_name,
            lat,
            lon,
            city
          FROM bus_stops
      - SELECT
            station_id AS id,
            station_id,
            station_name,
            lines,
            lat,
            lon
          FROM mrt_stations
      - SELECT
            station_id AS id,
            station_id,
            station_name,
            lat,
            lon
          FROM tra_stations
      - SELECT
            station_id AS id,
            station_id,
            station_name,
            lat,
            lon
          FROM thsr_stations
      - SELECT
            id,
            from_station_id,
            to_station_id,
            system,
            travel_time_min,
            fare_nt
          FROM mrt_journey_matrix
      - SELECT
            station_id || ':' || lineid || ':' || destinationstaionid || ':' || serviceday || ':' || system AS id,
            station_id,
            lineid,
            destinationstaionid,
            serviceday,
            system,
            firsttraintime AS first_train_time,
            lasttraintime AS last_train_time
          FROM mrt_schedule
