bucket_definitions:
  global:
    data:
      - SELECT
            sub_route_uid AS id,
            sub_route_name,
            route_name,
            route_uid,
            city,
            depart,
            destin
          FROM bus_static

      - SELECT
            id,
            type,
            uid,
            city,
            name,
            depart,
            destin,
            blob
          FROM search_vector
