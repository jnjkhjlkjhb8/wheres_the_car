syntax = "proto3";
option go_package = "github.com/jnjkhjlkjhb8/bus/models";

message subroute{
  string RouteUID = 1;
  string RouteName = 2;
  string SubRouteUID = 3;
  string SubRouteName = 4;
  map<int32,Direction> Directions = 7;
}

message Direction{
  string DepartureStopName = 1;
  string DestinationStopName = 2;
  string Geometry = 3;
  repeated stop Stops = 4;
}

message stop{
  string StopName = 1;
  int32 StopSequence = 2;
  double PositionLon = 3;
  double PositionLat = 4;
  string StationID = 5;
}

message RouteOfStop{
  string SubRouteUID = 2;
  int32 Direction = 3;
  repeated stop Stops = 4;
}

message Shape{
  string SubRouteUID = 1;
  int32 Direction = 2;
  string Geometry = 3;
}

message Station{
  string StationUID = 1;
  string StationName = 2;
  string city = 3;
  double PositionLon = 4;
  double PositionLat = 5;
}