syntax = "proto3";
option go_package = "github.com/jnjkhjlkjhb8/bus/models";
service Mrt_Service{
  rpc eta(Ask_mrt) returns (stream Resp_Mrt_eta) {}
}
message Resp_Mrt_eta{
  bytes data = 1;
}
message Ask_mrt{
  string system = 1;
  string StationID = 2;
}
message Mrt_live{
  string LineID = 1;
  string StationID = 2;
  string system = 3;
  string TripHeadSign = 4;
  string DestinationStaionID = 5;
  string DestinationStationName = 6;
  int32 ServiceStatus = 7;
  int32 EstimateTime = 8;
}