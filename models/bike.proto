syntax = "proto3";
option go_package = "github.com/jnjkhjlkjhb8/bus/models";

service Bike_Service{
  rpc static(Bike_request) returns (Bike_static) {}
  rpc eta(Bike_request) returns (stream Resp_Bike_eta) {}
}
message Bike_request{
  string StationUID = 1;
}
message Resp_Bike_eta{
  bytes data = 1;
}
message Bike_static{
  string StationUID = 1;
  string name = 2;
  int32 service_type = 3;
  int32 capacity = 4;
  string city = 5;
  string Lat = 6;
  string Lon = 7;
  string address = 8;
}
message Bike_eta{
  string StationUID = 1;
  int32 ServiceStatus = 2;
  int32 ServiceType = 3;
  int32 AvailableReturnBikes = 4;
  int32 GeneralBikes = 5;
  int32 ElectricBikes = 6;
}