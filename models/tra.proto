syntax = "proto3";
option go_package = "github.com/jnjkhjlkjhb8/bus/models";
service rquest_station{
  rpc live_board(ask_staiton) returns (stream tra_LiveBoards) {}
  rpc timetable(ask_staiton) returns (tra_timetable) {}
}
service request_route{
  rpc timetable(ask_route) returns (tra_timetable) {}
  rpc fare(ask_staiton) returns (TraFareItem) {}
  rpc delay(ask_route) returns (stream tra_delay) {}
}
message ask_route{
  string date = 1;
  string origin_station_id = 2;
  string destination_station_id = 3;
}
message ask_staiton{
  string station_id = 1;
  string date = 2;
}
message TraFareItem {
  string origin_station_id = 1;
  string destination_station_id = 2;
  string ticket_type = 3;
  int32 price = 4;
}
message tra_stoptime{
  int32 stop_sequence = 3;
  string station_id = 1;
  string station_name = 2;
  string ArrivalTime = 4;
  string DepartureTime = 5;
  bool SuspendedFlag = 6;
}
message tra_timetable{
  string TrainDate = 1;
  string TrainNo = 2;
  int32 Direction = 3;
  string Starting_Station_ID = 4;
  string Starting_Station_Name = 5;
  string TrainTypeID = 6;
  string TrainTypeCode = 7;
  string TrainTypeName = 8;
  int32 TripLine = 9;
  bool WheelchairFlag = 10;
  bool PackageServiceFlag = 11;
  bool DiningFlag = 12;
  bool BikeFlag = 13;
  bool BreastFeedingFlag = 14;
  bool DailyFlag = 15;
  bool ServiceAddedFlag = 16;
  bool SuspendedFlag = 17;
  string Note = 18;
  repeated tra_stoptime stoptimes = 19;
}
message tra_delay{
  string train_no = 1;
  string station_id = 2;
  int32 delay = 3;
}
message tra_LiveBoard{
  string train_no = 1;
  bool direction = 2;
  string train_type_id = 3;
  string train_type_code = 4;
  string train_type_name = 5;
  string ending_station_id = 6;
  string ending_station_name = 7;
  string scheduled_arrival_time = 8;
  string scheduled_departure_time = 9;
  int32 delay = 10;
}
message tra_LiveBoards{
  string station_id = 1;
  repeated tra_LiveBoard items = 2;
}