syntax = "proto3";
option go_package = "github.com/jnjkhjlkjhb8/bus/models";
service TRA_station_service{
  rpc live_board(ask_staiton) returns (stream Resp_tra_live_board) {}
}
service TRA_timetable_service{
  rpc timetable(ask_route) returns (tra_timetable) {}
  rpc fare(ask_staiton) returns (TraFareItem) {}
  rpc delay(ask_route) returns (stream Resp_tra_delay) {}
}
service TRA_Detain_service{
  rpc stops(ask_detain) returns (tra_stoptimes) {}
  rpc delay(ask_detain) returns (stream Resp_tra_delay) {}
}
message Resp_tra_live_board{
  bytes data = 1;
}
message Resp_tra_delay{
  bytes data = 1;
}
message ask_detain{
  string date = 1;
  string trainno = 2;
}
message ask_route{
  string date = 1;
  string origin_station_id = 2;
  string destination_station_id = 3;
}
message ask_staiton{
  string station_id = 1;
  string date = 2;
}
message TraFareItem {
  string origin_station_id = 1;
  string destination_station_id = 2;
  string ticket_type = 3;
  int32 price = 4;
}
message tra_fare_items {
  repeated TraFareItem items = 1;
}
message tra_timetables{
  repeated tra_timetable items = 1;
}
message tra_stoptimes{
  repeated tra_stoptime items = 1;
}
message tra_delays {
  map<string, int32> delay = 1;
}
message tra_stoptime{
  int32 stop_sequence = 3;
  string station_id = 1;
  string station_name = 2;
  string ArrivalTime = 4;
  string DepartureTime = 5;
  bool SuspendedFlag = 6;
}
message tra_timetable{
  string TrainDate = 1;
  string TrainNo = 2;
  int32 Direction = 3;
  string Starting_Station_Name = 4;
  string Ending_Station_Name = 5;
  string TrainTypeID = 6;
  string TrainTypeCode = 7;
  string TrainTypeName = 8;
  int32 TripLine = 9;
  int32 mask = 10;
  string Note = 11;
  string Starting_Time = 12;
  string Ending_Time = 13;
  string Travel_Time = 14;
}
message tra_delay{
  string train_no = 1;
  string station_id = 2;
  int32 delay = 3;
}
message tra_LiveBoard{
  string train_no = 1;
  bool direction = 2;
  string train_type_id = 3;
  string train_type_code = 4;
  string train_type_name = 5;
  string ending_station_id = 6;
  string ending_station_name = 7;
  string scheduled_arrival_time = 8;
  string scheduled_departure_time = 9;
  int32 delay = 10;
}
message tra_LiveBoards{
  string station_id = 1;
  repeated tra_LiveBoard items = 2;
}
