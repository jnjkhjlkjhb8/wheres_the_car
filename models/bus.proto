syntax = "proto3";
option go_package = "github.com/jnjkhjlkjhb8/bus/models";
service Bus_Route_Service{
  rpc static(Bus_Ask_Route) returns (Resp_Bus_static) {}
  rpc daily(Bus_Ask_Route) returns (Resp_Bus_daily_timetable) {}
  rpc eta(Bus_Ask_Route) returns (stream Resp_Bus_eta) {}
}
service Bus_Station_Service{
  rpc eta(Bus_Ask_Route) returns (stream Resp_Bus_eta) {}
}
message Bus_Ask_Route {
  string SubRouteUID = 1;
}
message Bus_Ask_Station {
  string StationName = 1;
  string city = 2;
}
message Resp_Bus_static{
  bytes data = 1;
}
message Resp_Bus_eta{
  bytes data = 1;
}
message Resp_Bus_daily_timetable{
  bytes data = 1;
}
message Bus_subroute{
  string RouteUID = 1;
  string RouteName = 2;
  string SubRouteUID = 3;
  string SubRouteName = 4;
  string DepartureStopName = 5;
  string DestinationStopName = 6;
  string city = 7;
  map<int32,Direction> Directions = 8;
}

message Direction{
  string DepartureStopName = 1;
  string DestinationStopName = 2;
  string Geometry = 3;
  repeated Bus_stop Stops = 4;
  repeated Bus_Schedule Schedules = 5;
}

message Bus_stop{
  string StopUID = 1;
  string StopName = 2;
  int32 StopSequence = 3;
  double PositionLon = 4;
  double PositionLat = 5;
  string StationID = 6;
}

message RouteOfStop{
  string SubRouteUID = 2;
  int32 Direction = 3;
  repeated Bus_stop Stops = 4;
}

message Shape{
  string SubRouteUID = 1;
  int32 Direction = 2;
  string Geometry = 3;
}

message Station{
  string StationUID = 1;
  string StationName = 2;
  string city = 3;
  double PositionLon = 4;
  double PositionLat = 5;
}

message Bus_RouteArrival{
  string sub_route_uid = 1;
  repeated Bus_RouteEstimate stops = 3;
}
message Bus_StationArrival{
  string station_name = 1;
  repeated string station_uid = 2;
  repeated Bus_StopEstimate routes = 3;
}
message Bus_RouteEstimate{
  string stop_uid = 1;
  int32 direction = 2;
  int32 estimate = 3;
  string NextBusTime = 4;
  int32 Stop_status = 5;
  string src_update_time = 6;
  repeated Bus_position Buses = 7;
}
message Bus_StopEstimate{
  string stop_uid = 1;
  string sub_route_uid = 2;
  string route_name = 3;
  int32 Direction = 4;
  int32 estimate = 5;
  string NextBusTime = 6;
  int32 Stop_status = 7;
  string src_update_time = 8;
  repeated Bus_position Buses = 9;
}
message Bus_position{
  string plate_numb = 1;
  double position_lon = 2;
  double position_lat = 3;
  int32 speed = 4;
  int32 azimuth = 5;
  int32 DutyStatus = 6;
  int32 BusStatus = 7;
  string gps_time = 8;
}
message Bus_schedule {
  repeated Bus_Schedule schedules = 1;
}
message Bus_Schedule {
  bool type = 1;
  string tripid = 2;
  bool islowfloor = 3;
  string start_Time = 4;
  string end_Time = 5;
  string MinHeadwayMins_arrival_time = 6;
  string MaxHeadwayMins_departure_time = 7;
  int32 service_day = 8;
}
message Bus_DailyTimetables{
  string SubRouteUID = 1;
  map<int32,temp> direction = 3;
}
message temp{
  repeated Bus_DailyTimetable DailyTimetables = 1;
}
message Bus_DailyTimetable{
  string TripID = 1;
  bool IsLowFloor = 2;
  repeated temp_StopTimes StopTimes = 3;
}
message temp_StopTimes{
  int32 StopSequence = 1;
  string ArrivalTime = 2;
  string DepartureTime = 3;
}