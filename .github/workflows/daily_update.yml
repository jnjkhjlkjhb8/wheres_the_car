on:
    schedule:
    - cron: '0 0 * * *'
    workflow_dispatch:
jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            - name: Setup
              run: |
                sudo apt-get update
                sudo apt-get install -y g++ curl nlohmann-json3-dev
                g++ -o3 scripts/update.cpp -o supermachine
            - name: Run
              env:
                Client_ID: ${{ secrets.CLIENT_ID }}
                Client_SECRET: ${{ secrets.CLIENT_SECRET }}
              run: |
                ./supermachine
                git config --local user.name "github-actions"
                git config --local user.email "github-actions@users.noreply.github.com"
                git add scripts/temp.json
                git commit -m "test" && git push
               # git diff --quiet && git diff --staged --quiet || (git commit -m "自動更新資料庫 $(date +%Y-%m-%d)" && git push)
