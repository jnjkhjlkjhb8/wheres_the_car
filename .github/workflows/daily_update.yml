on:
    schedule:
    - cron: '0 1 * * *'
      timezone: Asia/Taipei
    workflow_dispatch:
jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            - name: Setup
              run: |
                sudo apt-get update
                sudo apt-get install -y g++ curl nlohmann-json3-dev
                g++ -O3 scripts/update.cpp -o supermachine -I/usr/include/nlohmann/
            - name: Run
              env:
                Client_ID: ${{ secrets.CLIENT_ID }}
                Client_SECRET: ${{ secrets.CLIENT_SECRET }}
              run: |
                ./supermachine
                git config --local user.name "github-actions"
                git config --local user.email "github-actions@users.noreply.github.com"
                git add routes.json
                git commit -m "自動更新資料庫 $(date +%Y-%m-%d)" || echo "No changes to commit"
                git pull --rebase && git push