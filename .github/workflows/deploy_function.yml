name: deploy_function.yml
on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy_function.yml'
      - 'server/functions/**'
env:
  AZURE_FUNCTIONAPP_NAME: 'main'
  AZURE_FUNCTIONAPP_PACKAGE_PATH: '.'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: 'Checkout'
        uses: actions/checkout@v6
      - name: 'Setup'
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.3'
      - name: 'install'
        run: |
          sudo apt-get install -y protobuf-compiler
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          protoc --go_out=. --go_opt=paths=source_relative models/*.proto
          go mod tidy
          go mod download
      - name: 'build handler'
        run: GOOS=linux GOARCH=amd64 go build -o server/functions/handler ./server/functions
      - name: upload
        uses: actions/upload-artifact@v4
        with:
         name: gogomeat
         path: server/functions/handler
  deploy:
     runs-on: ubuntu-latest
     permissions:
       contents: read
     needs: build
     steps:
      - name: download
        uses: actions/download-artifact@v4
        with:
          name: gogomeat
      - name: 'log in'
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_DB8DDD7635304CE78B66541CB7154F0B }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_55415EB09D764C369EAD9925B827D838 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_AE37953F2CEC4FB1B476A44B06252F30}}
      - name: 'getip'
        id: ip
        run: |
          PUBLIC_IP=$(curl -s https://ipify.org)
          echo "ip=$PUBLIC_IP" >> $GITHUB_OUTPUT
      - name: 'set ip'
        run: |
          az functionapp config access-restriction add \
            --resource-group "supermachine_group" \
            --name "${{ env.AZURE_FUNCTIONAPP_NAME }}" \
            --rule-name "temp" \
            --action Allow \
            --ip-address "${{ steps.ip.outputs.ip }}/32" \
      - name: 'deploy'
        uses: Azure/functions-action@v1
        with:
           app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
           package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
      - name: 'remove ip'
        run: |
           az functionapp config access-restriction remove \
             --resource-group "supermachine_group" \
             --name "${{ env.AZURE_FUNCTIONAPP_NAME }}" \
             --rule-name "temp"
