services:
  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    mem_limit: 512m
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  router:
    build:
      context: .
      dockerfile: server/router/Dockerfile
    image: bus-router
    ports:
      - "50051:50051"
      - "8080:8080"
    env_file: ./docker.env
    environment:
      GOMEMLIMIT: 200MiB
      REDIS_ADDR: redis:6379
    mem_limit: 256m
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/.well-known/jwks.json || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
  functions:
    build:
      context: .
      dockerfile: server/functions/Dockerfile
    image: bus-functions
    env_file: ./docker.env
    environment:
      GOMEMLIMIT: 148MiB
      REDIS_ADDR: redis:6379
    mem_limit: 192m
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
  powersync:
    image: journeyapps/powersync-service:latest
    ports:
      - "8081:8080"
    volumes:
      - ./powersync/config.yaml:/config/config.yaml:ro
      - ./powersync/sync-rules.yaml:/config/sync-rules.yaml:ro
    env_file: ./docker.env
    environment:
      POWERSYNC_JWKS_URL: http://router:8080/api/.well-known/jwks.json
    mem_limit: 512m
    depends_on:
      router:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8080/api/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
  osrm:
    image: osrm/osrm-backend
    ports:
      - "127.0.0.1:5000:5000"
    volumes:
      - ./osrm-data:/data:ro
    command: >
      osrm-routed
        --algorithm mld
        --max-table-size 10000
        /data/${OSRM_FILE:-taiwan.osrm}
    mem_limit: 1536m
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
volumes:
  redis_data:
